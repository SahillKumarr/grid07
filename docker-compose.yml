version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: assignment_postgres
    environment:
      POSTGRES_DB: grid07db
      POSTGRES_USER: grid07user
      POSTGRES_PASSWORD: Root@1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: assignment_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: