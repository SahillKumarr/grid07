services:
  postgres:
    image: postgres:15
    container_name: assignment_postgres
    environment:
      POSTGRES_DB: neondb
      POSTGRES_USER: neondb_owner
      POSTGRES_PASSWORD: npg_xlaVptL36oCG
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: assignment_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: